name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-caas-ec2
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
          ECR_REGISTRY:          ${{ secrets.AWS_ACCOUNT_ID_PROD }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG:             ${{ github.event.workflow_run.head_sha }}
          CAAS_DB_URL:           ${{ secrets.CAAS_DB_URL }}
          CAAS_RABBITMQ_URL:     ${{ secrets.CAAS_RABBITMQ_URL }}
          CAAS_JWT_SECRET:       ${{ secrets.CAAS_JWT_SECRET }}
          CAAS_SENTRY_DSN:       ${{ secrets.CAAS_SENTRY_DSN }}
          CAAS_REDIS_URL:        ${{ secrets.CAAS_REDIS_URL }}
        with:
          host:     ${{ secrets.CAAS_EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          timeout:  120s
          envs:     AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION,ECR_REGISTRY,IMAGE_TAG,CAAS_DB_URL,CAAS_RABBITMQ_URL,CAAS_JWT_SECRET,CAAS_SENTRY_DSN,CAAS_REDIS_URL
          script: |
            set -e

            IMAGE="$ECR_REGISTRY/caas-api:$IMAGE_TAG"

            # ECR login using injected credentials
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # Pull new image
            docker pull "$IMAGE"

            # Stop and remove old container
            docker stop caas-api 2>/dev/null || true
            docker rm   caas-api 2>/dev/null || true

            # Ensure caas-net exists (idempotent)
            docker network create caas-net 2>/dev/null || true

            # Start new container
            docker run -d \
              --name caas-api \
              --network caas-net \
              --restart unless-stopped \
              -p 8080:8080 \
              -e PORT=8080 \
              -e LOG_LEVEL=info \
              -e DATABASE_URL="$CAAS_DB_URL" \
              -e RABBITMQ_URL="$CAAS_RABBITMQ_URL" \
              -e JWT_SECRET="$CAAS_JWT_SECRET" \
              -e SENTRY_DSN="$CAAS_SENTRY_DSN" \
              -e REDIS_URL="$CAAS_REDIS_URL" \
              -e ENVIRONMENT=production \
              "$IMAGE"

            # Health check (12 × 5s = 60s)
            for i in $(seq 1 12); do
              STATUS=$(curl -sf http://localhost:8080/v1/health | jq -r '.status' 2>/dev/null || echo "")
              if [ "$STATUS" = "ok" ]; then
                echo "Health check passed on attempt $i"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "Health check failed after 60s" >&2
                docker logs caas-api --tail 50 >&2
                exit 1
              fi
              sleep 5
            done

            # Write version file
            mkdir -p /home/ec2-user/caas-api
            printf "git_sha=%s\nimage=%s\ndeployed_at=%s\ndeployed_by=github-actions\n" \
              "$IMAGE_TAG" "$IMAGE" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              > /home/ec2-user/caas-api/version.txt

            # Prune dangling images
            docker image prune -f
